id: admin-ui-grid
name: Admin UI Grid
version: '1.0.0'
category: admin
description: Build Magento 2 admin grids using UI Component listing XML, data providers, and admin controllers with proper ACL integration

tags:
  - admin
  - ui-component
  - grid
  - listing
  - data-provider
  - acl

magento_versions:
  - '2.4.x'

instructions_file: instructions.md

conventions:
  - rule: 'Name the listing XML file as <entity>_listing.xml matching the database entity name'
    example: 'vendor_module_entity_listing.xml for the vendor_module_entity table'
    rationale: "Consistent naming between the listing file, data source, and collection factory registration prevents the common 'data source not found' configuration error."

  - rule: 'Always protect admin controllers with an ADMIN_RESOURCE constant referencing an ACL resource'
    example: "const ADMIN_RESOURCE = 'Vendor_Module::entity_manage';"
    rationale: "Without ACL protection, any admin user can access the grid regardless of role permissions. Magento's admin routing skips controllers that lack the resource constant."

  - rule: 'Register the grid collection in di.xml under CollectionFactory arguments with the exact data source name'
    example: "<item name=\"vendor_module_entity_listing_data_source\" xsi:type=\"string\">Vendor\\Module\\Model\\ResourceModel\\Entity\\Grid\\Collection</item>"
    rationale: 'The UI component framework resolves the data provider by looking up this exact key. A mismatch causes a blank grid with no error in the UI.'

examples:
  - title: 'Listing XML with toolbar and columns'
    description: 'Complete admin grid UI component defining data source, toolbar with filters and paging, and typed columns with sorting'
    language: xml
    code_file: examples/listing-xml-with-toolbar-and-columns.xml

  - title: 'Admin controller with ACL'
    description: 'Index controller that loads the admin page layout and enforces ACL-based access control'
    language: php
    code_file: examples/admin-controller-with-acl.php

  - title: 'Layout handle referencing UI component'
    description: 'Admin layout XML that loads the listing UI component into the page content area'
    language: xml
    code_file: examples/layout-handle-referencing-ui-component.xml

anti_patterns:
  - pattern: 'Missing data source registration in di.xml CollectionFactory arguments'
    problem: 'The grid renders with no rows and no visible error. The UI component framework silently falls back to an empty data set when the collection factory cannot resolve the data source name.'
    solution: |
      Register the collection in di.xml:
      <type name="Magento\Framework\View\Element\UiComponent\DataProvider\CollectionFactory">
          <arguments>
              <argument name="collections" xsi:type="array">
                  <item name="vendor_module_entity_listing_data_source"
                        xsi:type="string">Vendor\Module\Model\ResourceModel\Entity\Grid\Collection</item>
              </argument>
          </arguments>
      </type>

  - pattern: 'Mixing form and listing UI components in the same XML file'
    problem: 'The UI component framework expects distinct root elements (<listing> vs <form>). Mixing them causes schema validation failures and unpredictable JavaScript initialization errors in the admin panel.'
    solution: 'Create separate XML files: <entity>_listing.xml for the grid and <entity>_form.xml for the edit form. Reference each from its own layout handle.'

  - pattern: 'Admin controller without ADMIN_RESOURCE constant'
    problem: 'Without ADMIN_RESOURCE, Magento cannot enforce role-based access control. Every admin user gains access to the grid regardless of their ACL permissions, violating the principle of least privilege.'
    solution: 'Define the ADMIN_RESOURCE constant in every admin controller and create matching ACL entries in etc/acl.xml.'

files:
  - path: 'view/adminhtml/ui_component/{{entity}}_listing.xml'
    description: 'UI Component listing XML defining data source, toolbar, and column configuration'
    template: |
      <?xml version="1.0" encoding="UTF-8"?>
      <listing xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
               xsi:noNamespaceSchemaLocation="urn:magento:module:Magento_Ui:etc/ui_configuration.xsd">
          <argument name="data" xsi:type="array">
              <item name="js_config" xsi:type="array">
                  <item name="provider"
                        xsi:type="string">{{entity}}_listing.{{entity}}_listing_data_source</item>
              </item>
          </argument>
          <settings>
              <spinner>{{entity}}_columns</spinner>
              <deps>
                  <dep>{{entity}}_listing.{{entity}}_listing_data_source</dep>
              </deps>
          </settings>
      </listing>

  - path: 'Controller/Adminhtml/{{entityClass}}/Index.php'
    description: 'Admin grid index controller with ACL protection and page layout initialization'
    template: |
      <?php
      declare(strict_types=1);

      namespace {{vendor}}\{{module}}\Controller\Adminhtml\{{entityClass}};

      use Magento\Backend\App\Action;
      use Magento\Backend\App\Action\Context;
      use Magento\Framework\View\Result\PageFactory;
      use Magento\Framework\View\Result\Page;

      class Index extends Action
      {
          public const ADMIN_RESOURCE = '{{vendor}}_{{module}}::{{entity}}_manage';

          public function __construct(
              Context $context,
              private readonly PageFactory $resultPageFactory
          ) {
              parent::__construct($context);
          }

          public function execute(): Page
          {
              $resultPage = $this->resultPageFactory->create();
              $resultPage->setActiveMenu('{{vendor}}_{{module}}::{{entity}}');
              $resultPage->getConfig()->getTitle()->prepend(__('Manage {{entityLabel}}'));

              return $resultPage;
          }
      }

references:
  - title: 'Adobe Commerce: UI Components listing'
    url: 'https://developer.adobe.com/commerce/frontend-core/ui-components/components/listing-grid/'
  - title: 'Adobe Commerce: Admin controllers'
    url: 'https://developer.adobe.com/commerce/php/development/components/routing/custom-admin-router/'

compatibility:
  - claude
  - opencode
  - codex
  - qoder
