id: api-graphql-resolver
name: GraphQL Resolver
version: '1.0.0'
category: api
description: Implement Magento 2 GraphQL resolvers — define schema.graphqls types, write query and mutation resolvers, and handle authorization

tags:
  - graphql
  - resolver
  - api
  - schema
  - mutation
  - query

magento_versions:
  - '2.4.x'

instructions_file: instructions.md

conventions:
  - rule: 'Keep resolvers thin — delegate all business logic to service or repository classes'
    example: "Resolver calls $this->productRepository->getById($args['id']) and returns the result array"
    rationale: 'Thin resolvers are easier to test, reuse across REST and GraphQL, and maintain separation between transport layer and domain logic.'

  - rule: 'Validate all required arguments at the start of resolve() and throw GraphQlInputException for invalid input'
    example: "if (empty($args['input']['name'])) { throw new GraphQlInputException(__('Name is required')); }"
    rationale: 'Early validation provides clear error messages to API consumers and prevents partial operations that leave data in an inconsistent state.'

  - rule: 'Return associative arrays from resolvers matching the declared GraphQL type fields exactly'
    example: "return ['id' => $entity->getId(), 'name' => $entity->getName(), 'created_at' => $entity->getCreatedAt()];"
    rationale: "Magento's GraphQL framework maps array keys to type fields. Missing keys cause null responses; extra keys are silently ignored. Matching the schema prevents subtle data omission bugs."

examples:
  - title: 'schema.graphqls with query and mutation'
    description: 'GraphQL schema defining a custom type, a query field with resolver binding, and a mutation with input type'
    language: graphql
    code_file: examples/schema-graphqls-with-query-and-mutation.graphql

  - title: 'Query resolver implementation'
    description: 'Resolver class that fetches a single entity by ID, delegates to a repository, and returns the typed result array'
    language: php
    code_file: examples/query-resolver-implementation.php

  - title: 'Mutation resolver with input validation'
    description: 'Resolver that validates input, delegates entity creation to a service class, and returns the new entity data'
    language: php
    code_file: examples/mutation-resolver-with-input-validation.php

anti_patterns:
  - pattern: 'Embedding repository calls, data formatting, and business rules directly in the resolver'
    problem: 'Fat resolvers become untestable and cannot share logic with REST endpoints. Changes to business rules require modifying the transport layer, increasing the risk of regressions in API behavior.'
    solution: 'Extract business logic into service classes injected via the constructor. The resolver should only translate between GraphQL arguments and service method parameters.'

  - pattern: 'Returning raw model objects instead of typed arrays from resolve()'
    problem: "Magento's GraphQL framework expects associative arrays keyed by the GraphQL type field names. Returning model objects causes null values for all fields because the framework cannot map object properties to the schema."
    solution: |
      Always return an associative array matching the schema:
      return [
          'id' => (int) $entity->getId(),
          'name' => $entity->getName(),
      ];

  - pattern: 'Missing authorization checks in resolvers that handle customer or admin data'
    problem: 'Without explicit authorization checks, guest users can access customer data and unauthenticated requests can trigger admin operations. GraphQL introspection reveals the available fields, making unprotected resolvers easy to exploit.'
    solution: |
      Check authentication context at the start of resolve():
      if (false === $context->getExtensionAttributes()->getIsCustomer()) {
          throw new GraphQlAuthorizationException(__('Customer login required.'));
      }

files:
  - path: 'etc/schema.graphqls'
    description: 'GraphQL schema defining custom types, query fields, and mutations with resolver bindings'
    template: |
      type Query {
          {{entityName}}(id: Int! @doc(description: "Entity ID")): {{typeName}}
              @resolver(class: "{{vendor}}\\{{module}}\\Model\\Resolver\\{{typeName}}")
              @doc(description: "Retrieve {{entityName}} by ID")
      }

      type {{typeName}} @doc(description: "{{typeName}} entity type") {
          id: Int @doc(description: "Entity ID")
          name: String @doc(description: "Entity name")
      }

  - path: 'Model/Resolver/{{typeName}}.php'
    description: 'Query resolver class implementing ResolverInterface'
    template: |
      <?php
      declare(strict_types=1);

      namespace {{vendor}}\{{module}}\Model\Resolver;

      use Magento\Framework\GraphQl\Config\Element\Field;
      use Magento\Framework\GraphQl\Query\ResolverInterface;
      use Magento\Framework\GraphQl\Schema\Type\ResolveInfo;

      class {{typeName}} implements ResolverInterface
      {
          public function resolve(
              Field $field,
              $context,
              ResolveInfo $info,
              ?array $value = null,
              ?array $args = null
          ): array {
              // Delegate to service class and return typed array
              return [];
          }
      }

references:
  - title: 'Adobe Commerce: GraphQL development'
    url: 'https://developer.adobe.com/commerce/webapi/graphql/develop/'
  - title: 'Adobe Commerce: Define the GraphQL schema'
    url: 'https://developer.adobe.com/commerce/webapi/graphql/develop/create-graphqls-file/'

compatibility:
  - claude
  - opencode
  - codex
  - qoder
