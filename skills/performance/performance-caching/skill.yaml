id: performance-caching
name: Caching Strategies
version: '1.0.0'
category: performance
description: Configure Magento 2 caching layers — full page cache with Varnish, block-level caching with IdentityInterface, custom cache types, and targeted invalidation strategies

tags:
  - cache
  - fpc
  - performance
  - varnish
  - block-cache
  - cache-invalidation

magento_versions:
  - '2.4.x'

instructions_file: instructions.md

conventions:
  - rule: Define the invalidation strategy before adding any cache storage
    example: 'Document which cache tags will be cleaned and which events trigger the clean before writing cache save logic'
    rationale: Caching without a clear invalidation plan leads to stale data that is difficult to debug and erodes trust in the cache layer

  - rule: Implement IdentityInterface on every block that renders entity-dependent cached content
    example: 'class ProductList extends AbstractBlock implements IdentityInterface'
    rationale: Without IdentityInterface the framework cannot associate cache tags with block HTML, causing stale fragments to persist after entity updates

  - rule: Use specific cache tags to group related cache entries instead of flushing entire cache types
    example: "clean([Product::CACHE_TAG . '_' . $productId]) instead of TypeListInterface::cleanType('full_page')"
    rationale: Targeted invalidation preserves the majority of cached data and avoids the thundering herd problem that full cache flushes cause under load

examples:
  - title: 'Block implementing IdentityInterface with cache key info'
    description: 'Complete block class that declares cache tags, cache key components, and a finite cache lifetime for block_html caching'
    language: php
    code_file: examples/block-implementing-identity-interface-with-cache-key-info.php

  - title: 'Custom cache type registration (cache.xml + di.xml)'
    description: 'Declare a custom cache type so it appears in the admin cache management grid and can be flushed independently'
    language: xml
    code_file: examples/custom-cache-type-registration.xml

  - title: 'Programmatic cache operations with TypeListInterface'
    description: 'Service class that performs targeted cache invalidation and direct cache load/save using the framework cache interfaces'
    language: php
    code_file: examples/programmatic-cache-operations-with-type-list-interface.php

anti_patterns:
  - pattern: Embedding customer-specific data in full page cache output
    problem: FPC stores one response per URL regardless of session. Customer names, prices, or cart contents rendered in cacheable blocks leak across visitors and violate privacy regulations.
    solution: |
      Move personalized data to private content sections loaded via AJAX after page render:
      <!-- etc/frontend/sections.xml -->
      <action name="customer/account/login">
          <section name="customer"/>
      </action>
      Use customer-data JS components to render personalized blocks client-side.

  - pattern: Cacheable block missing IdentityInterface and cache tags
    problem: Without IdentityInterface the block HTML cache entry has no tags. Entity updates cannot trigger targeted invalidation, causing stale output until the entire block_html cache type is flushed.
    solution: |
      Implement IdentityInterface and return entity-specific tags:
      public function getIdentities(): array
      {
          return [Product::CACHE_TAG . '_' . $this->getProductId()];
      }

  - pattern: Flushing all caches instead of targeted tag-based invalidation
    problem: Calling bin/magento cache:flush or cleaning an entire cache type purges all entries, triggering a thundering herd of uncached requests that can saturate backend servers under load.
    solution: |
      Use tag-based invalidation to remove only affected entries:
      $this->cache->clean([Product::CACHE_TAG . '_' . $productId]);
      For cache type-level invalidation, prefer invalidate() over cleanType()
      because invalidate() marks the type as outdated without immediate purge.

files:
  - path: 'Block/{{blockName}}.php'
    description: 'Cacheable block implementing IdentityInterface with cache key info and lifetime'
    template: |
      <?php
      declare(strict_types=1);

      namespace {{vendor}}\{{module}}\Block;

      use Magento\Framework\DataObject\IdentityInterface;
      use Magento\Framework\View\Element\Template;

      class {{blockName}} extends Template implements IdentityInterface
      {
          private const CACHE_TAG = '{{cacheTag}}';
          private const CACHE_LIFETIME_SECONDS = 3600;

          public function getIdentities(): array
          {
              $id = $this->getData('entity_id');

              return $id !== null ? [self::CACHE_TAG . '_' . $id] : [];
          }

          public function getCacheKeyInfo(): array
          {
              return [
                  self::CACHE_TAG,
                  (string) $this->_storeManager->getStore()->getId(),
                  $this->getTemplate(),
              ];
          }

          public function getCacheLifetime(): int
          {
              return self::CACHE_LIFETIME_SECONDS;
          }
      }

  - path: 'etc/cache.xml'
    description: 'Custom cache type registration for module-specific cached data'
    template: |
      <?xml version="1.0"?>
      <config xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xsi:noNamespaceSchemaLocation="urn:magento:framework:Cache/etc/cache.xsd">
          <type name="{{cacheTypeName}}"
                translate="label,description"
                instance="Magento\Framework\Cache\Frontend\Decorator\TagScope">
              <label>{{cacheTypeLabel}}</label>
              <description>{{cacheTypeDescription}}</description>
          </type>
      </config>

references:
  - title: 'Adobe Commerce: Cache overview and types'
    url: 'https://developer.adobe.com/commerce/php/development/cache/'
  - title: 'Adobe Commerce: Full page caching'
    url: 'https://developer.adobe.com/commerce/php/development/cache/page/public-content/'

compatibility:
  - claude
  - opencode
  - cursor
  - codex
  - qoder
  - trae
