  - title: 'Adobe Commerce: Cache overview'
    url: 'https://developer.adobe.com/commerce/php/development/cache/'
  - title: 'Adobe Commerce: Web API authorization'
    url: 'https://developer.adobe.com/commerce/php/development/components/web-api/authentication/'
