id: standards-coding
name: Coding Standards
version: '1.0.0'
category: standards
description: Follow Magento 2 coding standards — service contracts, strict types, PHPCS rules, repository pattern, and extension attribute conventions

tags:
  - standards
  - phpcs
  - maintainability
  - service-contract
  - repository
  - strict-types

magento_versions:
  - '2.4.x'

instructions_file: instructions.md

conventions:
  - rule: 'Add declare(strict_types=1) to every PHP file without exception'
    example: "<?php\\ndeclare(strict_types=1);\\n\\nnamespace Vendor\\Module\\Model;"
    rationale: "Strict types prevent implicit type coercion that causes subtle bugs — a string '0' silently becoming integer 0, or a float losing precision when passed as int. Catching these at the call site makes debugging immediate."

  - rule: 'Define module APIs as interfaces in Api/ and bind implementations via di.xml preferences'
    example: 'Api/EntityRepositoryInterface with getById(), save(), delete(), getList() methods'
    rationale: 'Service contracts are the only API that Magento guarantees across versions. Other modules that depend on concrete classes break during upgrades because internal implementations are not part of the public API contract.'

  - rule: 'Keep method cyclomatic complexity below 10 and method length below 20 lines'
    example: 'Extract validation, transformation, and persistence into separate private methods or services'
    rationale: 'The Magento coding standard flags high complexity. Short methods with single responsibilities are easier to test, review, and extend through plugins.'

examples:
  - title: 'Service contract interface'
    description: 'Repository interface following the Magento service contract pattern with full PHPDoc for web API compatibility'
    language: php
    code_file: examples/service-contract-interface.php

  - title: 'Repository implementation'
    description: 'Concrete repository that implements the service contract using resource models for persistence and collection for list queries'
    language: php
    code_file: examples/repository-implementation.php

  - title: 'PHPCS configuration for CI'
    description: 'Composer script and phpcs.xml configuration to run the Magento 2 coding standard in a CI pipeline'
    language: xml
    code_file: examples/phpcs-configuration-for-ci.xml

anti_patterns:
  - pattern: 'Depending on concrete model classes instead of service contract interfaces'
    problem: 'Concrete classes are internal implementation. Magento may refactor, rename, or restructure them between patch versions. Modules depending on concrete classes break during upgrades without any deprecation notice.'
    solution: 'Type-hint all injected dependencies and method parameters with Api/ interfaces. Bind concrete implementations via di.xml preferences so the dependency graph uses interfaces throughout.'

  - pattern: 'Putting unrelated utility methods into a single Helper class'
    problem: 'Helper classes become procedural grab-bags that grow without bounds. They accumulate unrelated dependencies, become difficult to mock in tests, and create implicit coupling between features that share the helper.'
    solution: 'Replace each group of related methods with a focused service class in Model/ or Service/. Inject only the dependencies each service actually needs. Delete the helper when all methods have been extracted.'

  - pattern: 'Omitting declare(strict_types=1) from PHP files'
    problem: 'Without strict types, PHP silently coerces arguments — string to int, float to int, null to empty string. These coercions cause data integrity issues that manifest far from the source, making bugs extremely difficult to trace.'
    solution: 'Add declare(strict_types=1); immediately after the opening <?php tag in every file. Configure PHPCS to enforce this rule and reject non-strict files in CI.'

files:
  - path: 'Api/{{interfaceName}}.php'
    description: 'Service contract repository interface with standard CRUD methods'
    template: |
      <?php
      declare(strict_types=1);

      namespace {{vendor}}\{{module}}\Api;

      use Magento\Framework\Exception\NoSuchEntityException;
      use {{vendor}}\{{module}}\Api\Data\{{dataInterface}};

      interface {{interfaceName}}
      {
          /**
           * @param int $id
           * @return {{dataInterface}}
           * @throws NoSuchEntityException
           */
          public function getById(int $id): {{dataInterface}};
      }

  - path: 'phpcs.xml'
    description: 'PHPCS configuration applying the Magento 2 coding standard to the module'
    template: |
      <?xml version="1.0"?>
      <ruleset name="{{vendor}} {{module}}">
          <description>Magento 2 coding standard for {{vendor}} {{module}}</description>
          <rule ref="Magento2"/>
          <file>.</file>
          <exclude-pattern>*/Test/*</exclude-pattern>
          <arg name="extensions" value="php"/>
          <arg name="colors"/>
      </ruleset>

references:
  - title: 'Magento coding standard (GitHub)'
    url: 'https://github.com/magento/magento-coding-standard'
  - title: 'Adobe Commerce: Service contracts'
    url: 'https://developer.adobe.com/commerce/php/development/components/service-contracts/'

compatibility:
  - claude
  - opencode
  - codex
  - qoder
