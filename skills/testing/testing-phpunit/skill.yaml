id: testing-phpunit
name: PHPUnit Unit Tests
version: '1.0.0'
category: testing
description: Write PHPUnit-based unit tests for Magento 2 — setUp with mocks, assertion patterns, data providers, and exception testing without framework bootstrap

tags:
  - phpunit
  - unit-test
  - testing
  - mocking
  - data-provider
  - assertions

magento_versions:
  - '2.4.x'

instructions_file: instructions.md

conventions:
  - rule: 'Mock only direct constructor dependencies of the class under test'
    example: 'createMock(ProductRepositoryInterface::class) for a service that injects ProductRepositoryInterface'
    rationale: "Mocking indirect dependencies (dependencies of dependencies) couples the test to internal implementation. If the collaborator's internals change, the test breaks despite the subject's behavior being correct."

  - rule: 'Mirror the production namespace under Test/Unit/ for every test class'
    example: "Vendor\\Module\\Test\\Unit\\Model\\DataExporterTest tests Vendor\\Module\\Model\\DataExporter"
    rationale: 'Consistent namespace mirroring makes test discovery automatic and helps developers locate the test for any given class without searching.'

  - rule: 'Use data providers for testing multiple input/output combinations instead of duplicating test methods'
    example: '@dataProvider invalidInputProvider on a validation test method'
    rationale: 'Data providers make the test matrix explicit, reduce code duplication, and produce clearer failure messages that identify which input case failed.'

examples:
  - title: 'Service test with setUp and mocks'
    description: 'Complete unit test for a service class demonstrating mock creation in setUp, method stubbing, and result assertion'
    language: php
    code_file: examples/service-test-with-setup-and-mocks.php

  - title: 'Exception testing'
    description: 'Test that verifies a service throws the expected exception with a specific message when given invalid input'
    language: php
    code_file: examples/exception-testing.php

  - title: 'Data provider for input validation'
    description: 'Test using a data provider to verify validation logic against multiple invalid input scenarios'
    language: php
    code_file: examples/data-provider-for-input-validation.php

anti_patterns:
  - pattern: 'Using ObjectManager or Bootstrap in unit tests'
    problem: 'ObjectManager requires the full Magento framework to initialize, adding 10-30 seconds of bootstrap time per test run. Unit tests should run in milliseconds. Framework coupling masks design issues by hiding implicit dependencies.'
    solution: 'Inject all dependencies through the constructor and mock them in setUp(). If a class cannot be instantiated without ObjectManager, refactor it to accept interface-typed constructor parameters.'

  - pattern: 'Mocking the class under test instead of its dependencies'
    problem: "Mocking the subject creates a test that verifies mock behavior, not production behavior. The test passes even if the real class is completely broken because the mock's stubbed methods always return the expected values."
    solution: 'Instantiate the real class under test with mocked dependencies. Only mock the collaborators that are injected through the constructor.'

  - pattern: 'Writing assertions against implementation details instead of behavior'
    problem: 'Tests that assert specific method call sequences or argument counts break when internal refactoring occurs, even though the observable behavior is unchanged. This creates a high maintenance burden and false failures.'
    solution: |
      Assert outcomes: return values, state changes, or thrown exceptions.
      Use expects($this->once()) only when verifying that a side-effect
      (like saving to a repository) actually occurs, not for internal calls.

files:
  - path: 'Test/Unit/Model/{{className}}Test.php'
    description: 'PHPUnit test class with setUp, mock creation, and a basic test method'
    template: |
      <?php
      declare(strict_types=1);

      namespace {{vendor}}\{{module}}\Test\Unit\Model;

      use PHPUnit\Framework\MockObject\MockObject;
      use PHPUnit\Framework\TestCase;
      use {{vendor}}\{{module}}\Model\{{className}};

      class {{className}}Test extends TestCase
      {
          private {{className}} $subject;

          protected function setUp(): void
          {
              $this->subject = new {{className}}();
          }

          public function testExpectedBehavior(): void
          {
              $this->markTestIncomplete('Implement test logic');
          }
      }

  - path: 'phpunit.xml'
    description: "PHPUnit configuration scoped to the module's unit test directory"
    template: |
      <?xml version="1.0" encoding="UTF-8"?>
      <phpunit xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
               xsi:noNamespaceSchemaLocation="https://schema.phpunit.de/10.5/phpunit.xsd"
               bootstrap="vendor/autoload.php"
               colors="true">
          <testsuites>
              <testsuite name="{{module}} Unit Tests">
                  <directory>Test/Unit</directory>
              </testsuite>
          </testsuites>
      </phpunit>

references:
  - title: 'PHPUnit documentation'
    url: 'https://docs.phpunit.de/'
  - title: 'Adobe Commerce: Unit testing'
    url: 'https://developer.adobe.com/commerce/testing/guide/unit/'

compatibility:
  - claude
  - opencode
  - codex
  - qoder
