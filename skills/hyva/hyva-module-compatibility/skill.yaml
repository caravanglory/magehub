id: hyva-module-compatibility
name: Hyva Module Compatibility
version: '1.0.0'
category: hyva
description: Adapt Luma-oriented Magento 2 modules to work with Hyva themes — replace RequireJS and Knockout with Alpine.js, Tailwind CSS, and ViewModels

tags:
  - hyva
  - alpine
  - compatibility
  - tailwind
  - viewmodel
  - luma-migration

magento_versions:
  - '2.4.x'

instructions_file: instructions.md

conventions:
  - rule: 'Create a separate Hyva compatibility module rather than conditionally branching in the main module'
    example: 'Vendor_ModuleHyva depends on Vendor_Module and Hyva_Theme, containing only Hyva-specific templates and layout'
    rationale: 'A dedicated compatibility module keeps the Luma templates untouched, avoids runtime theme detection overhead, and allows stores to install the compatibility layer only when Hyva is active.'

  - rule: 'Use ViewModels for all template data access instead of adding public methods to block classes'
    example: "$viewModels->require(Vendor\\Module\\ViewModel\\ProductData::class)->getFormattedPrice()"
    rationale: 'ViewModels are lightweight, constructor-injectable services. Block methods are inherited and can conflict when blocks are substituted. ViewModels are also easier to unit test because they have no template rendering dependencies.'

  - rule: 'Replace every RequireJS dependency and Knockout binding with an Alpine.js equivalent'
    example: 'Replace data-bind="text: price" with x-text="price" inside an x-data component'
    rationale: 'Hyva does not load RequireJS or Knockout. Leftover bindings and require() calls cause silent JavaScript errors and non-functional UI in the storefront.'

examples:
  - title: 'Alpine.js component replacing Knockout widget'
    description: 'Interactive product quantity selector built with Alpine.js x-data, replacing the Luma Knockout-based qty widget'
    language: html
    code_file: examples/alpine-js-component-replacing-knockout-widget.html

  - title: 'ViewModel with layout XML injection'
    description: 'ViewModel class providing formatted data to templates, injected via layout XML arguments'
    language: php
    code_file: examples/viewmodel-with-layout-xml-injection.php

  - title: 'Hyva-compatible layout XML override'
    description: 'Layout XML that removes Luma blocks relying on RequireJS and adds Hyva-compatible replacements with Alpine.js templates'
    language: xml
    code_file: examples/hyva-compatible-layout-xml-override.xml

anti_patterns:
  - pattern: 'Leaving RequireJS require() calls or Knockout data-bind attributes in Hyva templates'
    problem: 'Hyva does not load RequireJS or Knockout. These bindings silently fail — no JavaScript errors appear in the console, but the UI elements they control render static and non-functional.'
    solution: 'Replace every require() call with an Alpine.js component using x-data. Replace every data-bind attribute with the Alpine equivalent (x-text, x-show, x-bind, @click). Test all interactive elements under the Hyva theme.'

  - pattern: 'Adding block methods for template data instead of using ViewModels'
    problem: 'Block methods are inherited through the block class hierarchy and can collide when Hyva substitutes block classes. Blocks also carry template rendering state that makes them hard to unit test.'
    solution: |
      Create a ViewModel implementing ArgumentInterface:
      class ProductData implements ArgumentInterface
      Inject it via layout XML and access in template:
      $viewModels->require(ProductData::class)->getData()

  - pattern: "Shipping Luma LESS files or inline CSS that conflicts with Tailwind's reset"
    problem: 'Tailwind applies a CSS reset (Preflight) that strips default margins, padding, and list styles. Luma LESS assumes browser defaults, so imported Luma styles render incorrectly — misaligned elements, missing spacing, unstyled lists.'
    solution: "Rewrite all styles using Tailwind utility classes applied directly in templates. For complex styles, use @apply in a dedicated CSS file loaded through the Hyva theme's build pipeline."

files:
  - path: 'view/frontend/templates/{{widgetName}}.phtml'
    description: 'Hyva-compatible template using Alpine.js for interactivity and Tailwind for styling'
    template: |
      <?php
      declare(strict_types=1);

      /** @var \Magento\Framework\View\Element\Template $block */
      /** @var \Vendor\Module\ViewModel\ProductData $viewModel */
      $viewModel = $block->getData('view_model');
      ?>
      <div x-data="{ open: false }" class="p-4 border rounded">
          <button @click="open = !open" class="px-4 py-2 bg-blue-600 text-white rounded">
              <?= $block->escapeHtml(__('Toggle')) ?>
          </button>
          <div x-show="open" x-transition class="mt-2">
              <?= $block->escapeHtml($viewModel->getFormattedPrice(1)) ?>
          </div>
      </div>

  - path: 'ViewModel/{{viewModelName}}.php'
    description: 'ViewModel providing data to Hyva templates without block class dependencies'
    template: |
      <?php
      declare(strict_types=1);

      namespace {{vendor}}\{{module}}\ViewModel;

      use Magento\Framework\View\Element\Block\ArgumentInterface;

      class {{viewModelName}} implements ArgumentInterface
      {
          public function getData(): array
          {
              return [];
          }
      }

references:
  - title: 'Hyva Themes documentation'
    url: 'https://docs.hyva.io/'
  - title: 'Hyva compatibility module guide'
    url: 'https://docs.hyva.io/hyva-themes/writing-compatible-extensions/'

compatibility:
  - claude
  - opencode
  - codex
  - qoder
