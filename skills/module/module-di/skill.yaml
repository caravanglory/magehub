id: module-di
name: Dependency Injection
version: '1.0.0'
category: module
description: Configure Magento 2 dependency injection — preferences, virtual types, constructor arguments, and proxy generation via di.xml

tags:
  - di
  - preference
  - virtualtype
  - proxy
  - constructor-injection
  - object-manager

magento_versions:
  - '2.4.x'

instructions_file: instructions.md

conventions:
  - rule: 'Inject interfaces, not concrete classes, in constructor parameters'
    example: 'public function __construct(ProductRepositoryInterface $productRepository)'
    rationale: 'Interface injection allows other modules to substitute implementations via preferences and keeps code decoupled from specific implementations.'

  - rule: 'Use virtual types instead of empty subclasses when only constructor arguments differ'
    example: "<virtualType name=\"CustomLogger\" type=\"Magento\\Framework\\Logger\\Monolog\"> with custom handler arguments"
    rationale: 'Virtual types eliminate unnecessary PHP class files and make the DI configuration the single source of truth for constructor wiring.'

  - rule: 'Never call ObjectManager directly in business classes'
    example: 'Replace ObjectManager::getInstance()->get(Logger::class) with constructor-injected LoggerInterface'
    rationale: 'Direct ObjectManager usage hides dependencies, breaks unit test isolation, and circumvents the DI configuration that other modules rely on for customization.'

examples:
  - title: 'Interface preference binding'
    description: 'Bind an interface to its concrete implementation so the object manager resolves the correct class for all constructor injections'
    language: xml
    code_file: examples/interface-preference-binding.xml

  - title: 'Virtual type with custom constructor arguments'
    description: 'Create a virtual logger instance with a custom handler without writing a PHP subclass'
    language: xml
    code_file: examples/virtual-type-with-custom-constructor-arguments.xml

  - title: 'Service class with constructor injection'
    description: 'Production-ready service class demonstrating proper constructor injection with interface type hints'
    language: php
    code_file: examples/service-class-with-constructor-injection.php

anti_patterns:
  - pattern: 'Direct ObjectManager usage in models, services, or controllers'
    problem: 'Hidden dependencies make the class impossible to unit test in isolation. Other modules cannot substitute implementations via di.xml because the dependency is resolved at call time, bypassing the DI container.'
    solution: |
      Replace all ObjectManager::getInstance()->get() and create() calls with
      constructor-injected dependencies:
      public function __construct(
          private readonly ProductRepositoryInterface $productRepository
      ) {}

  - pattern: 'Creating empty PHP subclasses only to change constructor arguments'
    problem: 'Pollutes the codebase with classes that contain no logic. Each empty subclass is another file to maintain and adds confusion about where behavior lives.'
    solution: |
      Use a virtualType in di.xml instead:
      <virtualType name="CustomizedService" type="Vendor\Module\Model\BaseService">
          <arguments>
              <argument name="config" xsi:type="string">custom_value</argument>
          </arguments>
      </virtualType>

  - pattern: 'Defining preferences in global di.xml when they only apply to one area'
    problem: 'A global preference overrides the interface binding in all areas — frontend, adminhtml, cron, REST, GraphQL. This causes unintended behavior when different areas need different implementations.'
    solution: 'Place the preference in the area-specific di.xml file (etc/frontend/di.xml or etc/adminhtml/di.xml) to restrict the binding to the intended scope.'

files:
  - path: 'etc/di.xml'
    description: 'Global dependency injection configuration with preferences and type argument overrides'
    template: |
      <?xml version="1.0"?>
      <config xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xsi:noNamespaceSchemaLocation="urn:magento:framework:ObjectManager/etc/config.xsd">
          <preference for="{{vendor}}\{{module}}\Api\{{interfaceName}}"
                      type="{{vendor}}\{{module}}\Model\{{className}}"/>
      </config>

  - path: 'Api/{{interfaceName}}.php'
    description: "Service contract interface for the module's primary API"
    template: |
      <?php
      declare(strict_types=1);

      namespace {{vendor}}\{{module}}\Api;

      interface {{interfaceName}}
      {
          /**
           * @return mixed
           */
          public function execute(): mixed;
      }

references:
  - title: 'Adobe Commerce: Dependency injection configuration'
    url: 'https://developer.adobe.com/commerce/php/development/build/dependency-injection-file/'
  - title: 'Adobe Commerce: Object manager overview'
    url: 'https://developer.adobe.com/commerce/php/development/components/object-manager/'

compatibility:
  - claude
  - opencode
  - codex
  - qoder
