id: module-setup
name: Setup Scripts
version: '1.0.0'
category: module
description: Implement declarative schema (db_schema.xml), data patches, and schema patches for Magento 2 database structure and data migrations

tags:
  - db_schema
  - patch
  - setup
  - migration
  - declarative-schema
  - whitelist

magento_versions:
  - '2.4.x'

instructions_file: instructions.md

conventions:
  - rule: 'Define all table structures in db_schema.xml — never use InstallSchema or UpgradeSchema'
    example: 'etc/db_schema.xml with <table name="vendor_module_entity"> containing column and constraint definitions'
    rationale: 'Declarative schema is the only supported approach since Magento 2.3. Legacy scripts cannot be automatically reversed during module uninstall and are not analyzed by the schema diff engine.'

  - rule: 'Regenerate db_schema_whitelist.json after every schema change'
    example: 'bin/magento setup:db-declaration:generate-whitelist --module-name=Vendor_Module'
    rationale: 'The whitelist tells Magento which schema elements your module owns. Without it, setup:upgrade cannot safely drop removed columns during uninstall, and CI pipelines will fail schema validation.'

  - rule: 'Make every data patch idempotent with existence checks before inserts or updates'
    example: 'Check if an attribute exists before calling addAttribute() inside the patch apply() method'
    rationale: 'Patches can re-run after failures or database restores. Non-idempotent patches cause duplicate key errors or corrupted data that requires manual database cleanup.'

examples:
  - title: 'db_schema.xml table definition'
    description: 'Complete declarative schema defining a custom entity table with primary key, columns, index, and foreign key constraint'
    language: xml
    code_file: examples/db-schema-xml-table-definition.xml

  - title: 'Data patch with idempotent checks'
    description: 'Data patch that adds a product attribute, checking for existence before creation to ensure safe re-execution'
    language: php
    code_file: examples/data-patch-with-idempotent-checks.php

  - title: 'db_schema_whitelist.json'
    description: 'Auto-generated whitelist file that tracks module-owned schema elements for safe uninstallation'
    language: json
    code_file: examples/db-schema-whitelist.json

anti_patterns:
  - pattern: 'Using InstallSchema or UpgradeSchema classes in new modules'
    problem: 'Legacy setup scripts run procedurally and cannot be reversed by the framework. Magento cannot diff the intended schema state, so uninstallation leaves orphaned tables and columns. CI tools that validate schema integrity flag legacy scripts as violations.'
    solution: 'Define all table structures in etc/db_schema.xml and run setup:db-declaration:generate-whitelist to produce the whitelist. Remove any Setup/InstallSchema.php or Setup/UpgradeSchema.php files.'

  - pattern: 'Editing db_schema_whitelist.json manually'
    problem: 'Manual edits can list schema elements the module does not own or omit elements it does own. This causes setup:upgrade to either skip necessary drops or accidentally drop columns belonging to other modules.'
    solution: 'Always regenerate the whitelist with the CLI command: bin/magento setup:db-declaration:generate-whitelist --module-name=Vendor_Module. Commit the regenerated file.'

  - pattern: 'Non-idempotent data patches that fail on re-execution'
    problem: 'Data patches without existence checks throw duplicate key or integrity constraint exceptions when re-run after partial failures or database restores. The patch_list table marks them as applied, but the data operation was incomplete.'
    solution: |
      Add explicit existence checks before every insert or attribute creation:
      if ($eavSetup->getAttributeId(Product::ENTITY, 'my_attr')) {
          return $this;
      }
      Wrap bulk inserts in a transaction and check for existing rows first.

files:
  - path: 'etc/db_schema.xml'
    description: 'Declarative schema definition for module database tables'
    template: |
      <?xml version="1.0"?>
      <schema xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xsi:noNamespaceSchemaLocation="urn:magento:framework:Setup/Declaration/Schema/etc/schema.xsd">
          <table name="{{vendor}}_{{module}}_entity" resource="default" engine="innodb"
                 comment="{{module}} Entity Table">
              <column xsi:type="int" name="entity_id" unsigned="true" nullable="false"
                      identity="true" comment="Entity ID"/>
              <constraint xsi:type="primary" referenceId="PRIMARY">
                  <column name="entity_id"/>
              </constraint>
          </table>
      </schema>

  - path: 'Setup/Patch/Data/{{patchName}}.php'
    description: 'Data patch template with idempotent apply method and dependency declarations'
    template: |
      <?php
      declare(strict_types=1);

      namespace {{vendor}}\{{module}}\Setup\Patch\Data;

      use Magento\Framework\Setup\ModuleDataSetupInterface;
      use Magento\Framework\Setup\Patch\DataPatchInterface;

      class {{patchName}} implements DataPatchInterface
      {
          public function __construct(
              private readonly ModuleDataSetupInterface $moduleDataSetup
          ) {
          }

          public function apply(): self
          {
              // Implement idempotent data migration here
              return $this;
          }

          public static function getDependencies(): array
          {
              return [];
          }

          public function getAliases(): array
          {
              return [];
          }
      }

references:
  - title: 'Adobe Commerce: Declarative schema configuration'
    url: 'https://developer.adobe.com/commerce/php/development/components/declarative-schema/configuration/'
  - title: 'Adobe Commerce: Data and schema patches'
    url: 'https://developer.adobe.com/commerce/php/development/components/declarative-schema/patches/'

compatibility:
  - claude
  - opencode
  - codex
  - qoder
