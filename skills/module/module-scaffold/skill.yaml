id: module-scaffold
name: Module Scaffolding
version: '1.0.0'
category: module
description: Create a new Magento 2 module with the required directory structure, registration files, composer autoloading, and module sequence declarations

tags:
  - module
  - scaffold
  - registration
  - composer
  - module-xml
  - boilerplate

magento_versions:
  - '2.4.x'

instructions_file: instructions.md

conventions:
  - rule: 'Name modules as Vendor_ModuleName using PascalCase for both segments'
    example: 'Acme_InventoryReservation, not acme_inventory-reservation'
    rationale: 'Magento module discovery splits on underscore and expects PascalCase directory names. Incorrect casing causes autoload failures on case-sensitive filesystems.'

  - rule: 'Declare sequence dependencies only for modules whose config or schema you directly override'
    example: '<sequence><module name="Magento_Catalog"/></sequence> when overriding catalog layout XML'
    rationale: 'Over-sequencing creates unnecessary load-order constraints and slows setup:upgrade. Under-sequencing causes config merge order bugs that surface only in specific environments.'

  - rule: 'Keep registration.php free of logic — one register call only'
    example: "ComponentRegistrar::register(ComponentRegistrar::MODULE, 'Vendor_Module', __DIR__);"
    rationale: 'Registration files execute on every request via Composer autoload. Side-effects here bypass the DI container and cause hard-to-trace performance and compatibility issues.'

examples:
  - title: 'registration.php'
    description: 'Standard module registration file with strict types and the single required ComponentRegistrar call'
    language: php
    code_file: examples/registration-php.php

  - title: 'etc/module.xml with sequence'
    description: 'Module declaration with a sequence dependency on Magento_Catalog to ensure correct config merge and schema patch order'
    language: xml
    code_file: examples/module-xml-with-sequence.xml

  - title: 'composer.json'
    description: 'Composer package definition with PSR-4 autoloading, magento2-module type, and framework dependency'
    language: json
    code_file: examples/composer-json.json

anti_patterns:
  - pattern: 'Missing etc/module.xml while registration.php exists'
    problem: "The module registers with the autoloader but Magento's module manager never loads it. Commands like setup:upgrade silently skip it, and no error appears in logs."
    solution: 'Always create etc/module.xml alongside registration.php. Run bin/magento module:status to verify the module appears in the enabled or disabled list.'

  - pattern: 'Hardcoding setup_version in module.xml for new modules'
    problem: 'The setup_version attribute is a legacy pattern from Magento 2.2 and earlier. Declarative schema and data patches replaced version-based setup scripts. Including it causes confusion about which migration system is active.'
    solution: 'Omit setup_version entirely for new modules. Use db_schema.xml for table definitions and DataPatchInterface classes for data migrations.'

  - pattern: 'PSR-4 namespace root does not match directory path'
    problem: 'Autoloader cannot find classes. Fatal errors appear only at runtime when the class is first instantiated through DI, making the root cause non-obvious.'
    solution: |
      Ensure the psr-4 key matches the directory structure exactly:
      "psr-4": { "Vendor\\Module\\": "" }
      for app/code/Vendor/Module, or adjust the path when using a src/ subdirectory.

files:
  - path: 'registration.php'
    description: 'Module registration file — required for Magento to discover the module'
    template: |
      <?php
      declare(strict_types=1);

      use Magento\Framework\Component\ComponentRegistrar;

      ComponentRegistrar::register(ComponentRegistrar::MODULE, '{{vendor}}_{{module}}', __DIR__);

  - path: 'etc/module.xml'
    description: 'Module declaration with optional sequence dependencies'
    template: |
      <?xml version="1.0"?>
      <config xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xsi:noNamespaceSchemaLocation="urn:magento:framework:Module/etc/module.xsd">
          <module name="{{vendor}}_{{module}}"/>
      </config>

references:
  - title: 'Adobe Commerce: Module registration'
    url: 'https://developer.adobe.com/commerce/php/development/build/component-registration/'
  - title: 'Adobe Commerce: Module dependencies'
    url: 'https://developer.adobe.com/commerce/php/development/build/component-file-structure/'

compatibility:
  - claude
  - opencode
  - codex
  - qoder
