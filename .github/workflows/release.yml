name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_tag:
        description: 'Existing git tag to publish (e.g. v0.1.2). Leave blank to only run release-please.'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || inputs.publish_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.publish_tag != '' && inputs.publish_tag || needs.release-please.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Upgrade npm for Trusted Publisher OIDC
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist artifacts
        run: |
          test -f dist/index.js
          head -n 1 dist/index.js | grep -q '^#!/usr/bin/env node'
          node ./dist/index.js --help

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --provenance --access public
